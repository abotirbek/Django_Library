{% extends 'base.html' %}
{% block content %}

<style>
    .book-container {
        max-width: 700px;
        margin: 50px auto;
        padding: 35px;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        font-family: Arial, sans-serif;
    }

    .book-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #222;
        font-size: 32px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
    }

    .form-group label {
        margin-bottom: 8px;
        font-weight: bold;
        color: #444;
    }

    .form-group input,
    .form-group textarea {
        padding: 14px;
        border: 1px solid #dcdcdc;
        border-radius: 10px;
        font-size: 16px;
        transition: 0.3s;
        outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        border-color: #6c63ff;
        box-shadow: 0 0 8px rgba(108, 99, 255, 0.3);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 150px;
    }

    .create-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #6c63ff, #8b5cf6);
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 17px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .create-btn:hover {
        transform: translateY(-2px);
        opacity: 0.95;
    }

    body {
        background: #f4f6fb;
    }
</style>

<div class="book-container">
    <h2>Create Book</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="title">Book Title</label>
            <input
                type="text"
                name="title"
                id="title"
                placeholder="Enter book title..."
                required
            >
        </div>
        
        <div class="form-group">
            <label for="image">Book Image</label>
            <input
                type="file"
                name="image"
                id="image"
                accept="image/*"
                required
            >
        </div>

        <div class="form-group">
            <label for="author">Author</label>
            <input
                type="text"
                name="author"
                id="author"
                placeholder="Enter author name..."
                required
            >
        </div>

        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input
                type="text"
                name="isbn"
                id="isbn"
                placeholder="Enter ISBN..."
                required
            >
        </div>

        <div class="form-group">
            <label for="publisher">Publisher</label>
            <input
                type="text"
                name="publisher"
                id="publisher"
                placeholder="Enter publisher..."
                required
            >
        </div>

        <div class="form-group">
            <label for="publication_date">Publication Date</label>
            <input
                type="date"
                name="publication_date"
                id="publication_date"
                required
            >
        </div>

        <div class="form-group">
            <label for="pages">Pages</label>
            <input
                type="number"
                name="pages"
                id="pages"
                placeholder="Number of pages..."
                min="1"
                required
            >
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea
                name="description"
                id="description"
                placeholder="Write a book description..."
                required
            ></textarea>
        </div>

        <button type="submit" class="create-btn">
            Create Book
        </button>
    </form>
</div>

{% endblock %}
